name: deploy-staging

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run crypto test suite
        working-directory: packages/crypto
        run: bun test

  build-check:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run --filter web build

  deploy:
    needs: build-check
    runs-on: ubuntu-latest
    steps:
      - name: Trigger remote staging deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          HANDOFF_TOKEN: ${{ secrets.HANDOFF_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 15m
          envs: HANDOFF_TOKEN
          script: |
            set -euo pipefail
            export PATH="$HOME/.local/bin:$PATH"
            handoff run --env staging --project handoff-web -- /srv/handoff-env/bin/deploy-staging.sh
            # Deploy without Handoff
            # script: |
            #   set -euo pipefail
            #   /srv/handoff-env/bin/deploy-staging.sh
